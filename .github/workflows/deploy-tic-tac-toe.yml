name: Deploy Tic Tac Toe to Pages

on:
  push:
    branches: [main]
    paths:
      - "src/static/**"
      - ".github/workflows/deploy-tic-tac-toe.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
